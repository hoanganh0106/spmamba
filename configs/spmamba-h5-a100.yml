# SPMamba config for H5 dataset on NVIDIA A100 (40GB VRAM)
# Dataset: 3 speakers + noise, 16kHz, from data_30h.h5
# Optimized for Google Colab A100 runtime
#
# Usage (Colab):
#   python audio_train.py --conf_dir configs/spmamba-h5-a100.yml
#   python audio_train.py --conf_dir configs/spmamba-h5-a100.yml --resume
#
# A100 Notes:
#   - 40GB HBM2e VRAM (Colab), Ampere architecture
#   - BF16/FP16/TF32 supported natively
#   - batch_size=8 + accumulate_grad_batches=3 → effective batch=24
#   - segment=4.0s để giữ nguyên theo dataset
#   - num_workers=4 (Colab A100 runtime thường có 4+ vCPUs)
#   - VRAM dư nhiều so với T4 → batch lớn hơn, throughput cao

# Network config (paper defaults)
audionet:
  audionet_name: SPMamba
  audionet_config:
    input_dim: 257        # n_fft//2+1 frequency bins
    n_srcs: 3              # 3 speakers to separate
    n_fft: 512             # paper: 512-point STFT
    stride: 128            # paper: hop_length=128
    window: hann
    n_imics: 1             # single channel input
    n_layers: 6            # paper: B=6 blocks
    lstm_hidden_units: 128 # paper: H=128 (each direction)
    attn_n_head: 4
    attn_approx_qk_dim: 512
    emb_dim: 16            # paper: C=16 embedding channels
    emb_ks: 4              # paper: K=4 kernel size
    emb_hs: 1              # paper: S=1 stride
    activation: prelu
    eps: 1.0e-5
    use_builtin_complex: True

# Loss config
loss:
  train:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_snr
    config:
      pit_from: pw_mtx
      threshold_byloss: false
  val:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_sisdr
    config:
      pit_from: pw_mtx
      threshold_byloss: false

# Training config optimized for A100 (40GB HBM2e)
training:
  system: AudioLightningModule
  gpus: [0]                        # single GPU on Colab
  parallel: null                   # no DDP for single GPU
  epochs: 200
  precision: bf16-mixed            # A100 Ampere: BF16 nhanh, không cần loss scaling
  accumulate_grad_batches: 3       # batch=8 x accum=3 → effective batch=24
  early_stop:
    monitor: val_loss/dataloader_idx_0
    mode: min
    patience: 20
    verbose: true
  SpeedAug: False

# Optimizer config
optimizer:
  optim_name: adam
  lr: 0.001
  weight_decay: 0.000001

# Scheduler config
scheduler: 
  sche_name: ReduceLROnPlateau
  sche_config:
    patience: 10
    factor: 0.5
    min_lr: 0.000001

# H5 Data config - A100 Colab optimized
datamodule:
  data_name: H5DataModule
  data_config:
    h5_path: /content/data.h5         # Local Colab path (copy từ Drive)
    n_src: 3
    sample_rate: 16000
    segment: 4.0                      # 4s segments
    normalize_audio: false
    batch_size: 8                     # ~29GB VRAM
    num_workers: 8                    # tăng worker để GPU không phải chờ data
    pin_memory: true
    persistent_workers: true          # keep workers alive, tránh respawn overhead
    val_ratio: 0.1
    test_ratio: 0.05
    seed: 42

# Experiment config
exp:
  exp_name: SPMamba-H5-3Speakers-A100
