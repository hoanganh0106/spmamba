# SPMamba config for H5 dataset on NVIDIA H100 (80GB VRAM)
# Dataset: 3 speakers + noise, 16kHz, from data_30h.h5
# Optimized for Google Colab A100/H100 runtime
#
# Usage (Colab):
#   python audio_train.py --conf_dir configs/spmamba-h5-h100.yml
#   python audio_train.py --conf_dir configs/spmamba-h5-h100.yml --resume
#
# H100 Notes:
#   - 80GB HBM3 VRAM, BF16/FP16/TF32 supported (Hopper architecture)
#   - batch_size=32 + accumulate_grad_batches=1 → effective batch=32
#   - segment=4.0s để giữ nguyên theo dataset
#   - num_workers=4 (Colab thường có 4+ vCPUs với H100)
#   - VRAM dư rất nhiều → tăng batch_size lớn để tận dụng throughput

# Network config (paper defaults)
audionet:
  audionet_name: SPMamba
  audionet_config:
    input_dim: 257        # n_fft//2+1 frequency bins
    n_srcs: 3              # 3 speakers to separate
    n_fft: 512             # paper: 512-point STFT
    stride: 128            # paper: hop_length=128
    window: hann
    n_imics: 1             # single channel input
    n_layers: 6            # paper: B=6 blocks
    lstm_hidden_units: 128 # paper: H=128 (each direction)
    attn_n_head: 4
    attn_approx_qk_dim: 512
    emb_dim: 16            # paper: C=16 embedding channels
    emb_ks: 4              # paper: K=4 kernel size
    emb_hs: 1              # paper: S=1 stride
    activation: prelu
    eps: 1.0e-5
    use_builtin_complex: True

# Loss config
loss:
  train:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_snr
    config:
      pit_from: pw_mtx
      threshold_byloss: false
  val:
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_sisdr
    config:
      pit_from: pw_mtx
      threshold_byloss: false

# Training config optimized for H100 (80GB HBM3)
training:
  system: AudioLightningModule
  gpus: [0]                        # single GPU on Colab
  parallel: null                   # no DDP for single GPU
  epochs: 200
  precision: bf16-mixed            # H100 Hopper: BF16 nhanh hơn FP16, không cần loss scaling
  accumulate_grad_batches: 1       # H100 VRAM đủ lớn, không cần accumulate
  early_stop:
    monitor: val_loss/dataloader_idx_0
    mode: min
    patience: 20
    verbose: true
  SpeedAug: False

# Optimizer config
optimizer:
  optim_name: adam
  lr: 0.001
  weight_decay: 0.000001

# Scheduler config
scheduler: 
  sche_name: ReduceLROnPlateau
  sche_config:
    patience: 10
    factor: 0.5
    min_lr: 0.000001

# H5 Data config - H100 optimized
datamodule:
  data_name: H5DataModule
  data_config:
    h5_path: /content/data.h5
    n_src: 3
    sample_rate: 16000
    segment: 4.0
    batch_size: 32
    num_workers: 4

# H5 Data config - H100 Colab optimized
datamodule:
  data_name: H5DataModule
  data_config:
    h5_path: /content/data.h5         # Local Colab path (upload hoặc mount từ Drive)
    n_src: 3
    sample_rate: 16000
    segment: 4.0                      # 4s segments
    normalize_audio: false
    batch_size: 32                    # H100 80GB: thoải mái với batch lớn
    num_workers: 8                    # Colab H100 runtime có ~12 vCPUs
    pin_memory: true
    persistent_workers: true          # keep workers alive, H100 runtime ổn định
    val_ratio: 0.1                    # 10% validation
    test_ratio: 0.05                  # 5% test
    seed: 42                          # deterministic split

# Experiment config
exp:
  exp_name: SPMamba-H5-3Speakers-H100
